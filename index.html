<!DOCTYPE html>
<html>
<head>
<title>Memorama Animales 3D</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
margin:0;
background:radial-gradient(circle at top,#2b2b52,#0f3460 70%);
font-family:Arial, Helvetica, sans-serif;
}
</style>
</head>

<body>

<a-scene id="escena" vr-mode-ui="enabled: true">

<a-light type="ambient" intensity="0.7"></a-light>
<a-light type="directional" position="2 6 3" intensity="0.8"></a-light>

<a-plane rotation="-90 0 0" width="30" height="30" color="#1f1f3a"></a-plane>

<a-box position="0 2 -3" width="12" height="6" depth="12"
material="color:#f0f0f0; side:back; roughness:0.9"></a-box>

<a-assets>

<img id="perro" src="assets/perro.jpeg">
<img id="gato" src="assets/gato.jpg">
<img id="conejo" src="assets/conejo.jpg">
<img id="panda" src="assets/panda.jpg">

<img id="cartaReverso" src="assets/carta.png">

<img id="iconReiniciar" src="assets/reiniciar.png">
<img id="iconMenu" src="assets/menu.png">

<img id="iconSonido" src="assets/sonido.png">
<img id="iconMuteImg" src="assets/mute.png">

<audio id="sonidoClick" src="assets/reloj.mp3"></audio>
<audio id="musicaFondo" src="assets/musica.mp3" loop></audio>
<audio id="sonidoAcierto" src="assets/acierto.mp3"></audio>
<audio id="sonidoGanaste" src="assets/ganaste.mp3"></audio>
<audio id="sonidoVoltear" src="assets/voltear.mp3"></audio>

</a-assets>

<a-entity id="sonidoReloj" sound="src:#sonidoClick; loop:true; volume:3"></a-entity>
<a-entity id="sonidoAciertoEntidad" sound="src:#sonidoAcierto; volume:2"></a-entity>
<a-entity id="sonidoGanasteEntidad" sound="src:#sonidoGanaste; volume:2"></a-entity>
<a-entity id="sonidoVoltearEntidad" sound="src:#sonidoVoltear; volume:2"></a-entity>

<a-entity id="musica3D"
position="0 1.5 -3"
sound="src:#musicaFondo;
loop:true;
positional:true;
distanceModel:inverse;
refDistance:2;
rolloffFactor:1.5;
volume:1">
</a-entity>

<!-- PANEL SUPERIOR -->
<a-plane position="0 4 -2.1" width="8" height="1"
color="#ffffff" opacity="0.85"></a-plane>

<!-- BOTÓN MUTE -->
<a-plane id="botonMute"
position="-4.3 4 -2"
width="0.45"
height="0.45"
material="src:#iconSonido; shader:flat; transparent:true">
</a-plane>

<a-text id="puntaje"
value="Pares: 0"
position="-3.3 4 -2"
color="#222"
width="6"
align="left"></a-text>

<a-text id="tiempo"
value="Tiempo: 0"
position="3.5 4 -2"
color="#222"
width="6"
align="right"></a-text>

<a-text id="ganaste"
value=""
position="0 3.2 -2"
color="#27ae60"
align="center"
width="8"></a-text>

<a-entity id="tablero"></a-entity>

<a-plane id="botonReiniciarIcono"
position="4.2 4 -2"
width="0.6"
height="0.6"
material="src:#iconReiniciar; shader:flat; transparent:true">
</a-plane>

<a-plane id="botonMenuIcono"
position="4.9 4 -2"
width="0.6"
height="0.6"
material="src:#iconMenu; shader:flat; transparent:true">
</a-plane>

<!-- BOTÓN VR -->
<a-plane id="botonVR"
position="0 0.2 -2"
width="1.5"
height="0.5"
color="#3498db">

<a-text
value="ENTRAR A VR"
align="center"
position="0 0 0.1"
color="white"
width="3">
</a-text>

</a-plane>

<a-entity camera look-controls wasd-controls position="0 1.6 3">
<a-cursor color="#f1c40f" fuse="true" fuse-timeout="2000"></a-cursor>
</a-entity>

</a-scene>

<script>

const escena=document.querySelector("#escena");
const tablero=document.querySelector("#tablero");

const textoPuntaje=document.querySelector("#puntaje");
const textoTiempo=document.querySelector("#tiempo");
const textoGanaste=document.querySelector("#ganaste");

const botonReiniciarIcono=document.querySelector("#botonReiniciarIcono");
const botonMenuIcono=document.querySelector("#botonMenuIcono");
const botonMute=document.querySelector("#botonMute");
const botonVR=document.querySelector("#botonVR");

const sonidoReloj=document.querySelector("#sonidoReloj");
const sonidoAcierto=document.querySelector("#sonidoAciertoEntidad");
const sonidoGanaste=document.querySelector("#sonidoGanasteEntidad");
const sonidoVoltear=document.querySelector("#sonidoVoltearEntidad");

const musica=document.querySelector("#musica3D");

let sonidoActivo=true;
let botonInicio=null;

let primeraCarta=null;
let segundaCarta=null;
let bloqueo=false;

let pares=0;
let tiempo=0;

let temporizador;
let juegoIniciado=false;

document.addEventListener("click",()=>{
musica.components.sound.playSound();
},{once:true});

botonVR.addEventListener("click",()=>{
document.querySelector("a-scene").enterVR();
});

botonMute.addEventListener("click",()=>{

sonidoActivo=!sonidoActivo;

if(sonidoActivo){

musica.setAttribute("sound","volume:1");
sonidoReloj.setAttribute("sound","volume:3");
sonidoAcierto.setAttribute("sound","volume:2");
sonidoGanaste.setAttribute("sound","volume:2");
sonidoVoltear.setAttribute("sound","volume:2");

botonMute.setAttribute("material","src:#iconSonido");

}else{

musica.setAttribute("sound","volume:0");
sonidoReloj.setAttribute("sound","volume:0");
sonidoAcierto.setAttribute("sound","volume:0");
sonidoGanaste.setAttribute("sound","volume:0");
sonidoVoltear.setAttribute("sound","volume:0");

botonMute.setAttribute("material","src:#iconMuteImg");

}

});

function crearBotonInicio(){

if(botonInicio) return;

botonInicio=document.createElement("a-box");

botonInicio.setAttribute("position","0 0.7 -2");
botonInicio.setAttribute("width","2.5");
botonInicio.setAttribute("height","0.7");
botonInicio.setAttribute("depth","0.3");
botonInicio.setAttribute("color","#27ae60");

const texto=document.createElement("a-text");

texto.setAttribute("value","INICIAR JUEGO");
texto.setAttribute("align","center");
texto.setAttribute("position","0 0 0.2");
texto.setAttribute("color","white");
texto.setAttribute("width","3");

botonInicio.appendChild(texto);

escena.appendChild(botonInicio);

botonInicio.addEventListener("click",()=>{

juegoIniciado=true;

sonidoReloj.components.sound.playSound();

crearTablero();
iniciarTiempo();

botonInicio.parentNode.removeChild(botonInicio);
botonInicio=null;

});

}

function iniciarTiempo(){

clearInterval(temporizador);

tiempo=0;

textoTiempo.setAttribute("value","Tiempo: 0");

temporizador=setInterval(()=>{
tiempo++;
textoTiempo.setAttribute("value","Tiempo: "+tiempo);
},1000);

}

function limpiarTablero(){

while(tablero.firstChild){
tablero.removeChild(tablero.firstChild);
}

}

function crearTablero(){

limpiarTablero();

pares=0;

primeraCarta=null;
segundaCarta=null;
bloqueo=false;

textoPuntaje.setAttribute("value","Pares: 0");
textoGanaste.setAttribute("value","");

const animales=[
"#perro","#gato","#conejo","#panda",
"#perro","#gato","#conejo","#panda"
];

animales.sort(()=>Math.random()-0.5);

for(let i=0;i<8;i++){

const carta=document.createElement("a-box");

const x=(i%4)*1.5-2.25;
const y=Math.floor(i/4)*-1.5+2;

carta.setAttribute("position",`${x} ${y} -3`);
carta.setAttribute("width","1");
carta.setAttribute("height","1");
carta.setAttribute("depth","0.2");

carta.setAttribute("material","src:#cartaReverso; color:white");

carta.dataset.animal=animales[i];
carta.dataset.volteada="false";
carta.dataset.acertada="false";

carta.addEventListener("click",function(){

if(!juegoIniciado) return;
if(bloqueo) return;
if(carta===primeraCarta) return;

if(carta.dataset.volteada==="true") return;
if(carta.dataset.acertada==="true") return;

carta.setAttribute("material","src:"+carta.dataset.animal+"; color:white");
carta.dataset.volteada="true";

sonidoVoltear.components.sound.playSound();

if(!primeraCarta){
primeraCarta=carta;
return;
}

segundaCarta=carta;
bloqueo=true;

if(primeraCarta.dataset.animal===segundaCarta.dataset.animal){

primeraCarta.dataset.acertada="true";
segundaCarta.dataset.acertada="true";

pares++;

sonidoAcierto.components.sound.playSound();

textoPuntaje.setAttribute("value","Pares: "+pares);

primeraCarta=null;
segundaCarta=null;
bloqueo=false;

if(pares===4){

clearInterval(temporizador);

sonidoReloj.components.sound.stopSound();

sonidoGanaste.components.sound.playSound();

textoGanaste.setAttribute("value","¡GANASTE! Tiempo: "+tiempo+" segundos");

crearBotonInicio();

}

}else{

setTimeout(()=>{

primeraCarta.setAttribute("material","src:#cartaReverso; color:white");
segundaCarta.setAttribute("material","src:#cartaReverso; color:white");

sonidoVoltear.components.sound.playSound();

primeraCarta.dataset.volteada="false";
segundaCarta.dataset.volteada="false";

primeraCarta=null;
segundaCarta=null;
bloqueo=false;

},900);

}

});

tablero.appendChild(carta);

}

}

botonReiniciarIcono.addEventListener("click",()=>{
if(!juegoIniciado) return;
crearTablero();
iniciarTiempo();
});

botonMenuIcono.addEventListener("click",()=>{

clearInterval(temporizador);

juegoIniciado=false;

sonidoReloj.components.sound.stopSound();

limpiarTablero();

textoTiempo.setAttribute("value","Tiempo: 0");
textoPuntaje.setAttribute("value","Pares: 0");
textoGanaste.setAttribute("value","");

crearBotonInicio();

});

crearBotonInicio();

</script>

</body>
</html>
